<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>StrategyAI</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>

<style>
:root {
  --bg:        #0A0C0F;
  --surface:   #111318;
  --border:    #1E2230;
  --border2:   #252B3B;
  --gold:      #C9A84C;
  --gold-dim:  #7A5F26;
  --gold-glow: rgba(201,168,76,.15);
  --text:      #E8E4DC;
  --muted:     #5A607A;
  --muted2:    #3A4055;
  --user-bg:   #141A2E;
  --user-b:    #1E2A4A;
  --bot-bg:    #111318;
  --chip-bg:   #1A2035;
  --green:     #3DD68C;
  --red:       #F87171;
  --blue:      #60A5FA;
  --font-head: 'DM Serif Display', Georgia, serif;
  --font-body: 'Outfit', sans-serif;
  --font-mono: 'DM Mono', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%; background: var(--bg); color: var(--text);
  font-family: var(--font-body); font-size: 14px; line-height: 1.7;
  -webkit-font-smoothing: antialiased;
}

/* ── Noise texture overlay ─────────────────────── */
body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  opacity: .4;
}

/* ── Layout ────────────────────────────────────── */
#shell {
  position: relative; z-index: 1;
  display: grid;
  grid-template-rows: auto 1fr auto;
  height: 100vh;
  max-width: 900px;
  margin: 0 auto;
}

/* ── Header ────────────────────────────────────── */
header {
  padding: 20px 28px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  gap: 16px;
  background: linear-gradient(180deg, rgba(201,168,76,.05) 0%, transparent 100%);
}

.brand { display: flex; align-items: center; gap: 14px; }

.brand-icon {
  width: 42px; height: 42px;
  background: linear-gradient(135deg, var(--gold) 0%, #7A5F26 100%);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  box-shadow: 0 0 24px rgba(201,168,76,.3);
  flex-shrink: 0;
}

.brand-text h1 {
  font-family: var(--font-head);
  font-size: 22px; font-weight: 400;
  color: var(--text);
  letter-spacing: .3px;
}

.brand-text p {
  font-size: 11px; color: var(--muted);
  font-family: var(--font-mono);
  letter-spacing: .6px;
  margin-top: 1px;
}

.meta-pills { display: flex; gap: 8px; flex-wrap: wrap; }

.pill {
  font-size: 10px; font-family: var(--font-mono);
  color: var(--gold); border: 1px solid var(--gold-dim);
  background: var(--gold-glow);
  padding: 3px 9px; border-radius: 99px;
  letter-spacing: .5px;
  white-space: nowrap;
}

/* ── Chat area ─────────────────────────────────── */
#chat {
  overflow-y: auto;
  padding: 24px 28px;
  display: flex; flex-direction: column; gap: 16px;
  scroll-behavior: smooth;
}

#chat::-webkit-scrollbar { width: 4px; }
#chat::-webkit-scrollbar-track { background: transparent; }
#chat::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

/* ── Empty state ───────────────────────────────── */
#empty {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  flex: 1; gap: 20px; padding: 40px 20px;
  animation: fadeIn .5s ease;
}

#empty .hero-text {
  font-family: var(--font-head);
  font-size: clamp(24px, 4vw, 36px);
  color: var(--text); text-align: center;
  line-height: 1.3;
}

#empty .hero-text em { color: var(--gold); font-style: italic; }

#empty .sub { color: var(--muted); font-size: 13px; text-align: center; max-width: 460px; }

.suggest-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
  gap: 10px; width: 100%; max-width: 680px;
}

.suggest-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  cursor: pointer;
  transition: border-color .2s, transform .15s, box-shadow .2s;
  font-size: 12.5px;
}

.suggest-card:hover {
  border-color: var(--gold-dim);
  transform: translateY(-2px);
  box-shadow: 0 4px 20px rgba(201,168,76,.1);
}

.suggest-card .card-icon { font-size: 18px; margin-bottom: 6px; }
.suggest-card .card-label { color: var(--text); font-weight: 500; font-size: 12.5px; }
.suggest-card .card-sub   { color: var(--muted); font-size: 11px; margin-top: 2px; }

/* ── Messages ──────────────────────────────────── */
.msg {
  display: flex; gap: 10px;
  animation: slideUp .25s ease;
}

.msg.user { flex-direction: row-reverse; }

.avatar {
  width: 32px; height: 32px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; flex-shrink: 0;
}

.msg.user .avatar { background: var(--user-b); }
.msg.bot  .avatar { background: var(--gold-glow); border: 1px solid var(--gold-dim); }

.bubble {
  max-width: 80%;
  border-radius: 12px;
  padding: 11px 16px;
  font-size: 13.5px; line-height: 1.65;
  white-space: pre-wrap;
  word-break: break-word;
}

.msg.user .bubble {
  background: var(--user-bg);
  border: 1px solid var(--user-b);
  border-top-right-radius: 3px;
  color: #D0D8F0;
}

.msg.bot .bubble {
  background: var(--bot-bg);
  border: 1px solid var(--border);
  border-top-left-radius: 3px;
}

/* Sources */
.sources-row {
  margin-top: 10px; padding-top: 10px;
  border-top: 1px solid var(--border);
  display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
}

.src-label { font-size: 10px; color: var(--muted); font-family: var(--font-mono); flex-basis: 100%; }

.src-chip {
  background: var(--chip-bg);
  border: 1px solid var(--border2);
  border-radius: 6px;
  padding: 3px 9px;
  font-size: 10.5px; color: var(--blue);
  font-family: var(--font-mono);
  display: flex; align-items: center; gap: 5px;
}

.src-score {
  color: var(--gold);
  font-size: 10px;
}

/* Query pills */
.queries-row { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 5px; }

.q-summary {
  font-size: 10px; color: var(--muted); cursor: pointer;
  display: flex; align-items: center; gap: 4px;
  background: none; border: none; color: var(--muted); font-family: var(--font-body);
  padding: 0;
}

.q-pill {
  font-size: 10.5px; background: rgba(99,102,241,.12); color: #818CF8;
  border: 1px solid rgba(99,102,241,.2);
  border-radius: 99px; padding: 2px 9px;
  font-family: var(--font-mono);
}

/* Typing indicator */
.typing-dot {
  display: inline-block; width: 6px; height: 6px;
  background: var(--gold); border-radius: 50%; margin: 0 2px;
  animation: bounce .9s infinite;
}
.typing-dot:nth-child(2) { animation-delay: .15s; }
.typing-dot:nth-child(3) { animation-delay: .30s; }

/* ── Status bar ────────────────────────────────── */
#statusbar {
  padding: 6px 28px;
  border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
  font-family: var(--font-mono); font-size: 10.5px; color: var(--muted);
  min-height: 28px;
}

#status-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--green); flex-shrink: 0;
  box-shadow: 0 0 6px var(--green);
}

#status-dot.thinking { background: var(--gold); box-shadow: 0 0 6px var(--gold); animation: pulse 1s infinite; }
#status-dot.error    { background: var(--red);  box-shadow: 0 0 6px var(--red); }

#status-txt { flex: 1; }
#mem-counter { color: var(--gold); }

/* ── Input bar ─────────────────────────────────── */
#inputbar {
  padding: 14px 28px 20px;
  background: var(--bg);
  border-top: 1px solid var(--border);
}

#input-wrap {
  display: flex; align-items: flex-end; gap: 10px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 14px;
  padding: 10px 14px;
  transition: border-color .2s, box-shadow .2s;
}

#input-wrap:focus-within {
  border-color: var(--gold-dim);
  box-shadow: 0 0 0 3px var(--gold-glow);
}

#msg-input {
  flex: 1; background: none; border: none; outline: none;
  color: var(--text); font-family: var(--font-body); font-size: 13.5px;
  line-height: 1.5; resize: none; max-height: 140px;
  overflow-y: auto;
}

#msg-input::placeholder { color: var(--muted2); }

.icon-btn {
  background: none; border: none; cursor: pointer;
  color: var(--muted); padding: 4px;
  border-radius: 6px;
  transition: color .2s, background .2s;
  line-height: 0;
  flex-shrink: 0;
}

.icon-btn:hover { color: var(--text); background: var(--border2); }

#send-btn {
  background: linear-gradient(135deg, var(--gold) 0%, #A07828 100%);
  border: none; cursor: pointer;
  color: #0A0C0F; padding: 7px 9px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  transition: opacity .2s, transform .1s, box-shadow .2s;
  flex-shrink: 0;
  box-shadow: 0 2px 12px rgba(201,168,76,.25);
}

#send-btn:hover:not(:disabled) { opacity: .9; box-shadow: 0 4px 20px rgba(201,168,76,.4); transform: translateY(-1px); }
#send-btn:active:not(:disabled) { transform: scale(.95); }
#send-btn:disabled { opacity: .35; cursor: not-allowed; }

#send-btn svg { width: 16px; height: 16px; }

/* ── Animations ────────────────────────────────── */
@keyframes fadeIn   { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp  { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes bounce   { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-5px); } }
@keyframes pulse    { 0%,100% { opacity: 1; } 50% { opacity: .4; } }

/* ── Scrollbar for textarea ─────────────────────── */
#msg-input::-webkit-scrollbar { width: 3px; }
#msg-input::-webkit-scrollbar-thumb { background: var(--border2); }

/* ── Error msg ─────────────────────────────────── */
.err-bubble { color: var(--red); font-size: 12.5px; }
</style>
</head>
<body>
<div id="shell">

  <!-- HEADER -->
  <header>
    <div class="brand">
      <div class="brand-icon">📊</div>
      <div class="brand-text">
        <h1>StrategyAI</h1>
        <p>GEMINI 2.5 FLASH · RRF MULTI-QUERY · CHROMADB</p>
      </div>
    </div>
    <div class="meta-pills">
      <span class="pill">text-embedding-004</span>
      <span class="pill">50+ Docs</span>
      <span class="pill">Hybrid Search</span>
    </div>
  </header>

  <!-- CHAT -->
  <div id="chat">
    <div id="empty">
      <div class="hero-text">Your strategic <em>thinking partner,</em><br/>powered by AI.</div>
      <p class="sub">Ask about frameworks, competitive dynamics, M&amp;A, innovation strategy, or any business challenge across 50+ curated documents.</p>
      <div class="suggest-grid" id="suggest-grid"></div>
    </div>
  </div>

  <!-- STATUS BAR -->
  <div id="statusbar">
    <div id="status-dot"></div>
    <span id="status-txt">Ready</span>
    <span id="mem-counter"></span>
  </div>

  <!-- INPUT -->
  <div id="inputbar">
    <div id="input-wrap">
      <textarea id="msg-input" rows="1" placeholder="Ask about Porter's Five Forces, BCG Matrix, Blue Ocean, M&A synergies…"></textarea>
      <button class="icon-btn" id="clear-btn" title="Clear conversation">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
        </svg>
      </button>
      <button id="send-btn" title="Send (Enter)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>

</div>

<script>
const API = 'http://localhost:5050';

const chatEl     = document.getElementById('chat');
const emptyEl    = document.getElementById('empty');
const inputEl    = document.getElementById('msg-input');
const sendBtn    = document.getElementById('send-btn');
const clearBtn   = document.getElementById('clear-btn');
const statusDot  = document.getElementById('status-dot');
const statusTxt  = document.getElementById('status-txt');
const memCounter = document.getElementById('mem-counter');

// ── Suggestions ───────────────────────────────────────────────────────────────
const SUGGESTIONS = [
  { icon:'🏰', label:"Porter's Five Forces", sub:'Competitive structure analysis', q:"Explain Porter's Five Forces with an industry example." },
  { icon:'🌊', label:'Blue Ocean Strategy',  sub:'Create uncontested markets',      q:'What is Blue Ocean Strategy and how is it applied?' },
  { icon:'🔥', label:'Disruption Theory',    sub:'Christensen\'s framework',        q:'How does disruptive innovation theory work?' },
  { icon:'⚖️', label:'M&A Synergies',        sub:'Value creation in deals',         q:'What are the key sources of M&A synergies?' },
  { icon:'🔺', label:'Value Chain Analysis', sub:'Porter\'s value activities',      q:'How do you perform a value chain analysis?' },
  { icon:'🗺️', label:'BCG Matrix',           sub:'Portfolio strategy',              q:'Explain the BCG Growth-Share Matrix and how to use it.' },
];

const grid = document.getElementById('suggest-grid');
SUGGESTIONS.forEach(s => {
  const card = document.createElement('div');
  card.className = 'suggest-card';
  card.innerHTML = `<div class="card-icon">${s.icon}</div><div class="card-label">${s.label}</div><div class="card-sub">${s.sub}</div>`;
  card.addEventListener('click', () => { inputEl.value = s.q; sendMessage(); });
  grid.appendChild(card);
});

// ── Auto-resize textarea ──────────────────────────────────────────────────────
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
});

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

sendBtn.addEventListener('click', sendMessage);
clearBtn.addEventListener('click', clearConversation);

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\n/g,'<br>');
}

function setStatus(state, text) {
  statusDot.className = state === 'thinking' ? 'thinking' : state === 'error' ? 'error' : '';
  statusTxt.textContent = text;
}

function updateMemCounter(turns, max) {
  memCounter.textContent = turns !== undefined ? `MEMORY ${turns}/${max ?? '?'} turns` : '';
}

function scrollBottom() {
  chatEl.scrollTop = chatEl.scrollHeight;
}

function hideEmpty() {
  if (emptyEl) emptyEl.style.display = 'none';
}

// ── Render messages ───────────────────────────────────────────────────────────
function appendMsg(role, content, sources, queries) {
  hideEmpty();
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const avatar = role === 'user'
    ? '<div class="avatar">👤</div>'
    : '<div class="avatar">🤖</div>';

  let srcHtml = '';
  if (sources && sources.length) {
    const chips = sources.map(s =>
      `<span class="src-chip">📄 ${esc(s.source)} <span class="src-score">${(s.score*100).toFixed(0)}%</span></span>`
    ).join('');
    srcHtml = `<div class="sources-row"><span class="src-label">RETRIEVED SOURCES</span>${chips}</div>`;
  }

  let qHtml = '';
  if (queries && queries.length > 1) {
    const pills = queries.map(q => `<span class="q-pill">${esc(q)}</span>`).join('');
    qHtml = `<div class="queries-row">${pills}</div>`;
  }

  const bubbleClass = content === '...' ? '' : '';
  const inner = content === '...'
    ? `<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>`
    : esc(content);

  div.innerHTML = `${role === 'user' ? '' : avatar}
    <div class="bubble ${content === '...' ? 'typing' : ''}">${inner}${srcHtml}${qHtml}</div>
    ${role === 'user' ? avatar : ''}`;

  chatEl.appendChild(div);
  scrollBottom();
  return div;
}

// ── Send ──────────────────────────────────────────────────────────────────────
async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;

  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtn.disabled = true;

  appendMsg('user', text);
  const typingEl = appendMsg('bot', '...');
  setStatus('thinking', 'Gemini is thinking…');

  try {
    const res  = await fetch(`${API}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text })
    });
    const data = await res.json();

    typingEl.remove();

    if (data.error) {
      appendMsg('bot', `⚠️ ${data.error}`);
      setStatus('error', 'Error occurred');
    } else {
      appendMsg('bot', data.answer, data.sources, data.queries);
      setStatus('', 'Ready');
      updateMemCounter(data.turns, data.max_turns);
    }
  } catch (err) {
    typingEl.remove();
    appendMsg('bot', '⚠️ Could not reach server. Is the Flask cell running?');
    setStatus('error', 'Server unreachable — check notebook kernel');
  } finally {
    sendBtn.disabled = false;
    inputEl.focus();
  }
}

// ── Clear ─────────────────────────────────────────────────────────────────────
async function clearConversation() {
  try { await fetch(`${API}/clear`, { method: 'POST' }); } catch (_) {}
  chatEl.innerHTML = '';
  chatEl.appendChild(emptyEl);
  emptyEl.style.display = '';
  setStatus('', 'Ready');
  updateMemCounter(0);
}

// ── Init status ───────────────────────────────────────────────────────────────
(async () => {
  try {
    const r = await fetch(`${API}/status`);
    const d = await r.json();
    setStatus('', 'Connected');
    updateMemCounter(d.turns, d.max);
  } catch {
    setStatus('error', 'Server not detected — run the Flask cell first');
  }
})();
</script>
</body>
</html>
